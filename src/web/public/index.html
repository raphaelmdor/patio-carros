<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111318" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Pátio de Carros</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="topbar">
    <span class="topbar-title">🅿️ Pátio de Carros</span>
    <span class="topbar-status" id="status-dot" title="Status da conexão"></span>
  </header>

  <main class="content">

    <!-- ── Dashboard ── -->
    <section class="page active" id="page-dashboard">
      <div class="cards-row">
        <div class="card stat-card">
          <div class="stat-icon">🚗</div>
          <div class="stat-value" id="stat-patio">—</div>
          <div class="stat-label">No pátio agora</div>
        </div>
        <div class="card stat-card">
          <div class="stat-icon">📋</div>
          <div class="stat-value" id="stat-hoje">—</div>
          <div class="stat-label">Movimentos hoje</div>
        </div>
        <div class="card stat-card">
          <div class="stat-icon">🗂️</div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">Total cadastrados</div>
        </div>
      </div>
      <div class="section-title">Últimas movimentações</div>
      <div id="dashboard-list" class="mov-list"></div>
    </section>

    <!-- ── Entrada ── -->
    <section class="page" id="page-entrada">
      <div class="card form-card">
        <label class="field-label">Placa do veículo</label>
        <div class="input-row">
          <input id="entrada-placa" class="placa-input" type="text"
                 placeholder="ABC1D23" maxlength="8"
                 autocomplete="off" autocapitalize="characters" />
          <button class="btn-primary" id="btn-consultar" onclick="consultarDetran()">Consultar</button>
        </div>
        <div id="entrada-alerta" class="alerta hidden"></div>
      </div>

      <div class="card form-card hidden" id="entrada-dados">
        <div class="section-title" style="margin-top:0">Dados do veículo</div>

        <label class="field-label">Marca</label>
        <input id="entrada-marca" class="field-input" type="text" placeholder="Ex: Volkswagen" />

        <label class="field-label" style="margin-top:10px">Modelo</label>
        <input id="entrada-modelo" class="field-input" type="text" placeholder="Ex: Gol" />

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
          <div>
            <label class="field-label">Cor</label>
            <input id="entrada-cor" class="field-input" type="text" placeholder="Ex: Branco" />
          </div>
          <div>
            <label class="field-label">Ano</label>
            <input id="entrada-ano" class="field-input" type="number" placeholder="2024" />
          </div>
        </div>

        <label class="field-label" style="margin-top:10px">Proprietário (opcional)</label>
        <input id="entrada-proprietario" class="field-input" type="text" placeholder="Nome do proprietário" />

        <label class="field-label" style="margin-top:10px">Vaga (opcional)</label>
        <input id="entrada-vaga" class="field-input" type="text" placeholder="Ex: A1" />

        <label class="field-label" style="margin-top:10px">Observação (opcional)</label>
        <textarea id="entrada-obs" class="field-textarea" rows="2" placeholder="..."></textarea>

        <button class="btn-success full-btn" id="btn-entrada" onclick="registrarEntrada()">
          ✅ Registrar entrada
        </button>
      </div>
    </section>

    <!-- ── Saída ── -->
    <section class="page" id="page-saida">
      <div class="card form-card">
        <label class="field-label">Placa do veículo</label>
        <div class="input-row">
          <input id="saida-placa" class="placa-input" type="text"
                 placeholder="ABC1D23" maxlength="8"
                 autocomplete="off" autocapitalize="characters" />
          <button class="btn-primary" id="btn-verificar" onclick="verificarSaida()">Verificar</button>
        </div>
        <div id="saida-alerta" class="alerta hidden"></div>
      </div>

      <div class="card form-card hidden" id="saida-dados">
        <div class="section-title" style="margin-top:0">Veículo no pátio</div>
        <div class="field-grid" id="saida-campos"></div>

        <label class="field-label" style="margin-top:12px">Observação (opcional)</label>
        <textarea id="saida-obs" class="field-textarea" rows="2" placeholder="..."></textarea>

        <button class="btn-danger full-btn" id="btn-saida" onclick="registrarSaida()">
          🚪 Registrar saída
        </button>
      </div>
    </section>

    <!-- ── Pátio ── -->
    <section class="page" id="page-patio">
      <div class="search-bar">
        <input id="patio-search" class="search-input" type="search"
               placeholder="Buscar placa ou modelo…" oninput="filtrarPatio()" />
        <button class="btn-icon" onclick="carregarPatio()" title="Atualizar">⟳</button>
      </div>
      <div id="patio-list" class="patio-list"></div>
    </section>

    <!-- ── Histórico ── -->
    <section class="page" id="page-historico">
      <div class="card form-card filtro-card">
        <div class="filtro-row">
          <input id="hist-placa" class="field-input" type="text"
                 placeholder="Placa" maxlength="8" autocapitalize="characters" />
          <input id="hist-inicio" class="field-input" type="date" />
          <input id="hist-fim"    class="field-input" type="date" />
          <button class="btn-primary" onclick="carregarHistorico()">Buscar</button>
        </div>
      </div>
      <div id="historico-list" class="mov-list"></div>
    </section>

  </main>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="dashboard" onclick="navTo('dashboard')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Dashboard</span>
    </button>
    <button class="nav-btn" data-page="entrada" onclick="navTo('entrada')">
      <span class="nav-icon">⬇️</span>
      <span class="nav-label">Entrada</span>
    </button>
    <button class="nav-btn" data-page="saida" onclick="navTo('saida')">
      <span class="nav-icon">⬆️</span>
      <span class="nav-label">Saída</span>
    </button>
    <button class="nav-btn" data-page="patio" onclick="navTo('patio')">
      <span class="nav-icon">🚗</span>
      <span class="nav-label">Pátio</span>
    </button>
    <button class="nav-btn" data-page="historico" onclick="navTo('historico')">
      <span class="nav-icon">🕐</span>
      <span class="nav-label">Histórico</span>
    </button>
  </nav>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Success overlay -->
  <div id="overlay" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-icon" id="overlay-icon">✅</div>
      <div class="overlay-title" id="overlay-title"></div>
      <div class="overlay-body"  id="overlay-body"></div>
      <button class="btn-primary full-btn" onclick="fecharOverlay()">OK</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
